name: Update mobileconfig

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p dns
          curl -L "https://github.com/dns-khoindvn/top-country-stats/releases/download/DNS/khoindvn.io.vn.mobileconfig" -o dns/khoindvn.io.vn.mobileconfig

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dns/khoindvn.io.vn.mobileconfig
          git diff --cached --quiet || git commit -m "Update mobileconfig"
          git push
